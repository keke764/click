<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Hearts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d12;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
    position: relative;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow */
  .ambient {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 100, 150, 0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    animation: ambientPulse 6s ease-in-out infinite;
  }

  @keyframes ambientPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  .intro {
    position: fixed;
    top: 48px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  .intro p {
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: 300;
    font-style: italic;
    color: rgba(255, 200, 220, 0.55);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(255, 100, 150, 0.3);
    animation: fadeIn 2s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  .heart-wrapper {
    position: absolute;
    cursor: pointer;
    user-select: none;
    transform-origin: center;
    transition: filter 0.2s;
    z-index: 2;
  }

  .heart-wrapper:hover svg {
    filter: drop-shadow(0 0 16px rgba(255, 100, 150, 0.9));
  }

  .heart-wrapper svg {
    display: block;
    filter: drop-shadow(0 0 8px rgba(255, 100, 150, 0.5));
    transition: filter 0.2s;
  }

  /* Split burst animation */
  @keyframes splitLeft {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx-left), var(--dy)) scale(1); opacity: 1; }
  }
  @keyframes splitRight {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx-right), var(--dy)) scale(1); opacity: 1; }
  }

  .spawning-left {
    animation: splitLeft 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .spawning-right {
    animation: splitRight 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* Pop burst particles */
  .burst {
    position: absolute;
    pointer-events: none;
    z-index: 5;
  }

  .burst-dot {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #ff6ba8;
    animation: burstOut 0.5s ease-out forwards;
  }

  @keyframes burstOut {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--bx), var(--by)) scale(0); opacity: 0; }
  }

  /* Heart count display */
  .counter {
    position: fixed;
    bottom: 36px;
    right: 40px;
    font-size: 13px;
    font-weight: 300;
    font-style: italic;
    color: rgba(255, 180, 210, 0.3);
    letter-spacing: 0.1em;
    z-index: 10;
    pointer-events: none;
    transition: color 0.3s;
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="intro">
  <p>Click Heart</p>
</div>

<div id="canvas-container"></div>

<div class="counter" id="counter">1 heart</div>

<script>
  const container = document.getElementById('canvas-container');
  const counter = document.getElementById('counter');
  let heartCount = 0;

  function createHeartSVG(size) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 100 100');
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M50 85 C50 85 10 58 10 32 C10 18 20 10 32 10 C40 10 47 15 50 20 C53 15 60 10 68 10 C80 10 90 18 90 32 C90 58 50 85 50 85 Z');

    // Pink gradient fill
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    const grad = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
    grad.setAttribute('id', 'hg' + Math.random().toString(36).slice(2));
    grad.setAttribute('cx', '45%');
    grad.setAttribute('cy', '35%');
    grad.setAttribute('r', '60%');

    const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    s1.setAttribute('offset', '0%');
    s1.setAttribute('stop-color', '#ff9ec4');

    const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    s2.setAttribute('offset', '100%');
    s2.setAttribute('stop-color', '#e8356b');

    grad.appendChild(s1);
    grad.appendChild(s2);
    defs.appendChild(grad);
    svg.appendChild(defs);
    path.setAttribute('fill', `url(#${grad.id})`);
    svg.appendChild(path);
    return svg;
  }

  function spawnBurst(x, y) {
    const burst = document.createElement('div');
    burst.className = 'burst';
    burst.style.left = x + 'px';
    burst.style.top = y + 'px';
    for (let i = 0; i < 10; i++) {
      const dot = document.createElement('div');
      dot.className = 'burst-dot';
      const angle = (i / 10) * Math.PI * 2;
      const dist = 30 + Math.random() * 30;
      dot.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
      dot.style.setProperty('--by', Math.sin(angle) * dist + 'px');
      dot.style.animationDelay = (Math.random() * 0.08) + 's';
      burst.appendChild(dot);
    }
    container.appendChild(burst);
    setTimeout(() => burst.remove(), 600);
  }

  function updateCounter() {
    counter.textContent = heartCount === 1 ? '1 heart' : heartCount + ' hearts';
  }

  class Heart {
    constructor(x, y, size, vx, vy, phase) {
      this.x = x;
      this.y = y;
      this.size = size;
      this.vx = vx || (Math.random() - 0.5) * 0.45;
      this.vy = vy || (Math.random() - 0.5) * 0.45;
      this.phase = phase || Math.random() * Math.PI * 2;
      this.floatAmplX = 9 + Math.random() * 12;
      this.floatAmplY = 9 + Math.random() * 12;
      this.floatSpeed = 0.0025 + Math.random() * 0.004;
      this.rotAmp = 3 + Math.random() * 6;
      this.rotSpeed = 0.002 + Math.random() * 0.003;
      this.originX = x;
      this.originY = y;
      this.el = this.createElement();
      this.active = true;
      heartCount++;
      updateCounter();
    }

    createElement() {
      const wrapper = document.createElement('div');
      wrapper.className = 'heart-wrapper';
      wrapper.style.width = this.size + 'px';
      wrapper.style.height = this.size + 'px';
      wrapper.style.left = (this.x - this.size / 2) + 'px';
      wrapper.style.top = (this.y - this.size / 2) + 'px';
      wrapper.appendChild(createHeartSVG(this.size));
      wrapper.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!this.active) return;
        this.split();
      });
      container.appendChild(wrapper);
      return wrapper;
    }

    split() {
      this.active = false;
      spawnBurst(this.x, this.y);

      // Shrink and remove
      this.el.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
      this.el.style.transform = `translate(-50%, -50%) scale(0)`;
      this.el.style.opacity = '0';
      heartCount--;
      updateCounter();
      setTimeout(() => this.el.remove(), 220);

      const newSize = Math.max(28, this.size * 0.82);
      const spread = 60 + Math.random() * 40;
      const angle = Math.random() * Math.PI * 2;

      // Left child
      setTimeout(() => {
        new Heart(
          this.x + Math.cos(angle) * spread * 0.5,
          this.y + Math.sin(angle) * spread * 0.5,
          newSize,
          Math.cos(angle) * 1.5 + (Math.random() - 0.5),
          Math.sin(angle) * 1.5 + (Math.random() - 0.5),
          Math.random() * Math.PI * 2
        );
        new Heart(
          this.x - Math.cos(angle) * spread * 0.5,
          this.y - Math.sin(angle) * spread * 0.5,
          newSize,
          -Math.cos(angle) * 1.5 + (Math.random() - 0.5),
          -Math.sin(angle) * 1.5 + (Math.random() - 0.5),
          Math.random() * Math.PI * 2
        );
      }, 50);
    }

    update(t) {
      if (!this.active) return;
      this.originX += this.vx;
      this.originY += this.vy;

      const W = window.innerWidth;
      const H = window.innerHeight;
      const margin = this.size;
      if (this.originX < margin) { this.originX = margin; this.vx *= -1; }
      if (this.originX > W - margin) { this.originX = W - margin; this.vx *= -1; }
      if (this.originY < margin) { this.originY = margin; this.vy *= -1; }
      if (this.originY > H - margin) { this.originY = H - margin; this.vy *= -1; }

      this.x = this.originX + Math.sin(t * this.floatSpeed + this.phase) * this.floatAmplX;
      this.y = this.originY + Math.cos(t * this.floatSpeed * 0.7 + this.phase) * this.floatAmplY;
      const rot = Math.sin(t * this.rotSpeed + this.phase) * this.rotAmp;

      this.el.style.left = (this.x - this.size / 2) + 'px';
      this.el.style.top = (this.y - this.size / 2) + 'px';
      this.el.style.transform = `rotate(${rot}deg)`;
    }
  }

  const hearts = [];
  const originalUpdate = Heart.prototype.update;
  const allHearts = [];

  // Override to track all hearts
  const OrigHeart = Heart;
  function createHeart(x, y, size, vx, vy, phase) {
    const h = new Heart(x, y, size, vx, vy, phase);
    allHearts.push(h);
    return h;
  }

  // Initial heart in center
  const W = window.innerWidth;
  const H = window.innerHeight;
  createHeart(W / 2, H / 2, 80);

  // Also patch Heart constructor to auto-track
  // Instead, let's use a simple array approach
  const Heart2 = Heart;

  function animate(t) {
    allHearts.forEach(h => h.update(t));
    requestAnimationFrame(animate);
  }

  // Patch new Heart calls to auto-add to allHearts
  const origSplit = Heart.prototype.split;
  Heart.prototype.split = function() {
    const self = this;
    self.active = false;
    spawnBurst(self.x, self.y);
    self.el.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
    self.el.style.transform = `rotate(0deg) scale(0)`;
    self.el.style.opacity = '0';
    heartCount--;
    updateCounter();
    setTimeout(() => self.el.remove(), 220);

    const newSize = Math.max(28, self.size * 0.82);
    const spread = 55 + Math.random() * 35;
    const angle = Math.random() * Math.PI * 2;

    setTimeout(() => {
      const h1 = new Heart(
        self.x + Math.cos(angle) * spread * 0.5,
        self.y + Math.sin(angle) * spread * 0.5,
        newSize,
        Math.cos(angle) * 0.6 + (Math.random() - 0.5) * 0.3,
        Math.sin(angle) * 0.6 + (Math.random() - 0.5) * 0.3,
        Math.random() * Math.PI * 2
      );
      const h2 = new Heart(
        self.x - Math.cos(angle) * spread * 0.5,
        self.y - Math.sin(angle) * spread * 0.5,
        newSize,
        -Math.cos(angle) * 0.6 + (Math.random() - 0.5) * 0.3,
        -Math.sin(angle) * 0.6 + (Math.random() - 0.5) * 0.3,
        Math.random() * Math.PI * 2
      );
      allHearts.push(h1, h2);
    }, 80);
  };

  requestAnimationFrame(animate);
</script>
</body>
</html>
